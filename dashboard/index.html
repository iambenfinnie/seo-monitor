<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Monitor Dashboard</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --gold: #D4A017;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e5e5e5;
    --muted: #737373;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--gold); }
  #last-updated { font-size: 12px; color: var(--muted); }
  main { max-width: 1100px; margin: 0 auto; padding: 32px; }
  .site-block { margin-bottom: 48px; }
  .site-title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .rank { font-weight: 700; font-size: 15px; }
  .rank.top3 { color: var(--gold); }
  .rank.top10 { color: var(--green); }
  .rank.top20 { color: var(--yellow); }
  .rank.notfound { color: var(--muted); font-size: 12px; font-weight: 400; }
  .change.up { color: var(--green); font-weight: 600; }
  .change.down { color: var(--red); font-weight: 600; }
  .change.flat { color: var(--muted); }
  .competitor { font-size: 12px; color: var(--muted); }
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 24px; }
  .spark-bar { width: 6px; border-radius: 2px 2px 0 0; background: var(--border); transition: background 0.2s; }
  .spark-bar.active { background: var(--gold); }
  #loading { text-align: center; padding: 80px; color: var(--muted); }
  .no-data { color: var(--muted); font-style: italic; font-size: 13px; padding: 24px 0; }
</style>
</head>
<body>
<header>
  <h1>SEO <span>Monitor</span></h1>
  <span id="last-updated">Loading...</span>
</header>
<main id="app">
  <div id="loading">Loading rank data...</div>
</main>

<script>
const HISTORY_URL = 'https://raw.githubusercontent.com/iambenfinnie/seo-monitor/main/rank-history.json';
const SNAPSHOTS_BASE = 'https://raw.githubusercontent.com/iambenfinnie/seo-monitor/main';

function today() {
  return new Date().toISOString().split('T')[0];
}

function rankClass(rank) {
  if (!rank) return 'notfound';
  if (rank <= 3) return 'top3';
  if (rank <= 10) return 'top10';
  if (rank <= 20) return 'top20';
  return '';
}

function rankLabel(rank) {
  return rank ? `#${rank}` : 'Not in top 30';
}

function changeHtml(change) {
  if (change === null || change === undefined) return `<span class="change flat">new</span>`;
  if (change > 0) return `<span class="change up">▲${change}</span>`;
  if (change < 0) return `<span class="change down">▼${Math.abs(change)}</span>`;
  return `<span class="change flat">—</span>`;
}

async function loadSnapshot(date) {
  try {
    const r = await fetch(`${SNAPSHOTS_BASE}/snapshot-${date}.json`);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

async function render() {
  const app = document.getElementById('app');

  const [history, snapshot] = await Promise.all([
    fetch(HISTORY_URL).then(r => r.json()).catch(() => ({})),
    loadSnapshot(today())
  ]);

  const date = today();
  document.getElementById('last-updated').textContent = `Last run: ${date}`;

  if (!snapshot && Object.keys(history).length === 0) {
    app.innerHTML = `<p class="no-data">No rank data yet — check back after the first daily run.</p>`;
    return;
  }

  const source = snapshot || history;
  let html = '';

  for (const [site, data] of Object.entries(source)) {
    const keywords = snapshot ? data.keywords : data;
    html += `<div class="site-block">`;
    html += `<div class="site-title">${site}</div>`;
    html += `<table>
      <thead><tr>
        <th>Keyword</th>
        <th>Rank</th>
        <th>Change</th>
        <th>Top Competitor</th>
      </tr></thead><tbody>`;

    for (const [keyword, d] of Object.entries(keywords)) {
      const rank = snapshot ? d.rank : d.rank;
      const change = snapshot ? d.change : null;
      const competitors = snapshot ? (d.competitors || {}) : {};
      const topComp = Object.entries(competitors).sort((a, b) => a[1] - b[1])[0];
      const compStr = topComp ? `${topComp[0]} <b>#${topComp[1]}</b>` : '—';

      html += `<tr>
        <td>${keyword}</td>
        <td><span class="rank ${rankClass(rank)}">${rankLabel(rank)}</span></td>
        <td>${changeHtml(change)}</td>
        <td class="competitor">${compStr}</td>
      </tr>`;
    }

    html += `</tbody></table></div>`;
  }

  app.innerHTML = html;
}

render();
</script>
</body>
</html>
