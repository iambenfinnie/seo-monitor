name: Daily SEO Rank Tracker

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM EST daily
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run rank tracker
        run: node tracker.js

      - name: Send report
        run: node reporter.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Commit rank history and snapshot
        run: |
          git config user.name "seo-monitor[bot]"
          git config user.email "seo-monitor@noreply"
          git add rank-history.json screenshots/ || true
          git add -f snapshot-*.json || true
          git diff --cached --quiet || git commit -m "chore: rank snapshot $(date +%Y-%m-%d)"
          git push

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          force_orphan: true
